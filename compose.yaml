services:
  arcaneledger:
    build:
      context: .
    container_name: arcaneledger
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${HOST_PORT:-8000}:8000"
    environment:
      HOST: 0.0.0.0
      PORT: "8000"
      DATA_DIR: /app/data
      DEFAULT_IMPORT: /imports/export.csv
    volumes:
      - ./data:/app/data
      - ./imports:/imports:ro
